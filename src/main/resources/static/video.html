<!doctype html>
<html lang="ja">
<head>
    <meta charset="UTF-8" />
    <!-- キャッシュ無効化 -->
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
    <meta http-equiv="Pragma" content="no-cache">
    <meta http-equiv="Expires" content="0">
    
    <title>Slime OS - Video</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <script>
        // Tailwind 共通設定
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        slime: {
                            primary: '#0ea5e9',
                            secondary: '#10b981',
                            dark: '#0f172a',
                            light: '#bae6fd',
                            glass: 'rgba(255, 255, 255, 0.1)',
                        },
                    },
                    backdropBlur: {
                        'xs': '2px',
                        'sm': '4px',
                        'md': '8px',
                        'lg': '12px',
                    },
                }
            }
        }
    </script>

    <style>
        /* ========== 共通リセット ========== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: "Segoe UI", sans-serif;
            background: url("06.jpeg") no-repeat center center fixed;
            background-size: cover;
            color: #1a1a1a;
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* ========== サイドバー：共通仕様 ========== */
        .sidebar {
            position: absolute;
            top: 0;
            left: 0;
            height: 100vh;
            width: 180px;
            background-color: rgba(15, 23, 42, 0.2);
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
            border-right: 1px solid rgba(186, 230, 253, 0.2);
            padding: 15px 0;
            font-size: 14px;
            z-index: 80;
            pointer-events: auto !important;
        }
        .sidebar ul {
            list-style: none;
        }
        .sidebar ul li a {
            display: block;
            color: #f8fafc;
            text-decoration: none;
            font-size: 15px;
            padding: 12px 16px;
            margin: 4px 8px;
            border-radius: 8px;
            transition: all 0.2s ease;
            line-height: 1.5;
            position: relative;
            z-index: 81;
        }
        .sidebar ul li a:hover {
            background-color: rgba(14, 165, 233, 0.3);
            padding-left: 20px;
        }
        .sidebar ul li a.active {
            background-color: rgba(14, 165, 233, 0.4);
            color: #fff;
            font-weight: 600;
        }

        /* ========== メインエリア ========== */
        .main-content {
            position: absolute;
            top: 0;
            left: 180px;
            right: 0;
            bottom: 56px; /* タスクバー分の余白 */
            padding: 20px;
            background-color: transparent;
            backdrop-filter: none;
            overflow-y: auto;
            z-index: 40;
        }
        .main-content::-webkit-scrollbar {
            width: 8px;
        }
        .main-content::-webkit-scrollbar-track {
            background: rgba(255,255,255,0.1);
        }
        .main-content::-webkit-scrollbar-thumb {
            background-color: rgba(14, 165, 233, 0.5);
            border-radius: 4px;
        }

        .section-title {
            font-size: 18px;
            border-bottom: 1px solid rgba(14, 165, 233, 0.3);
            padding-bottom: 8px;
            margin-bottom: 20px;
            color: #0f172a;
            font-weight: 600;
        }

        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 30px;
            margin-bottom: 30px;
        }

        .item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            padding: 15px 10px;
            cursor: pointer;
            border-radius: 10px;
            color: #111;
            font-weight: 500;
            transition: all 0.2s;
            text-align: center;
            background-color: rgba(255, 255, 255, 0.15);
            backdrop-filter: blur(4px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .item:hover {
            background-color: rgba(14, 165, 233, 0.25);
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.1);
        }

        .icon {
            width: 48px;
            height: 48px;
            background-color: transparent;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 32px;
            margin-bottom: 4px;
        }

        /* ========== 🎬 ビデオプレイヤーウィンドウ ========== */
        .video-window {
            display: none;
            position: absolute;
            top: 5%;
            left: 10%;
            width: 80%;
            height: 85%;
            background-color: #000;
            backdrop-filter: blur(12px);
            border-radius: 12px;
            box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
            border: 1px solid rgba(14, 165, 233, 0.3);
            z-index: 200;
            flex-direction: column;
            overflow: hidden;
            resize: both;
            min-width: 500px;
            min-height: 350px;
        }

        .window-header {
            background: linear-gradient(135deg, #0ea5e9, #10b981);
            padding: 12px 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            font-weight: bold;
            user-select: none;
            font-size: 14px;
            color: #fff;
            cursor: move;
        }

        .close-btn {
            background: none;
            border: none;
            font-size: 16px;
            cursor: pointer;
            color: #fff;
            padding: 4px 8px;
            border-radius: 6px;
            transition: all 0.2s;
        }
        .close-btn:hover {
            color: #ef4444;
            background-color: rgba(255, 255, 255, 0.2);
        }

        .video-container {
            flex-grow: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            background: #000;
            position: relative;
            overflow: hidden;
        }
        #videoPlayer {
            width: 100%;
            height: 100%;
            object-fit: contain;
        }

        .video-toolbar {
            background-color: #1a1a1a;
            padding: 10px 15px;
            display: flex;
            gap: 15px;
            align-items: center;
            color: white;
            border-top: 1px solid rgba(255,255,255,0.1);
            flex-wrap: wrap;
        }
        .video-toolbar button {
            background: #333;
            color: white;
            border: none;
            padding: 8px 16px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 14px;
            transition: background 0.2s;
        }
        .video-toolbar button:hover {
            background: #555;
        }
        .video-open-btn {
            background: #0ea5e9;
        }
        .video-open-btn:hover {
            background: #0284c7;
        }
        .video-toolbar input[type="range"] {
            width: 120px;
            cursor: pointer;
        }
        .hidden-input {
            display: none;
        }

        /* ========== スライムアニメーション ========== */
        .slime {
            position: absolute;
            animation: float 6s ease-in-out infinite;
            cursor: pointer;
            pointer-events: auto;
            z-index: 60;
            transition: transform 0.3s ease;
        }
        .slime:hover {
            transform: scale(1.1);
        }
        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-15px); }
        }

        /* ========== スタートメニュー ========== */
        .menu-glass { 
            background: rgba(30, 41, 59, 0.85); 
            backdrop-filter: blur(15px); 
            -webkit-backdrop-filter: blur(15px);
            border: 1px solid rgba(14, 165, 233, 0.2);
            position: fixed;
            left: 210px;
            bottom: 60px;
            z-index: 9999 !important;
            pointer-events: auto;
        }
        #startMenu.opacity-0 {
            pointer-events: none !important;
        }

        /* ========== タスクバー ========== */
        .taskbar {
            position: fixed;
            bottom: 0;
            left: 0;
            width: 100%;
            height: 56px;
            background: rgba(0, 0, 0, 0.3);
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            border-top: 1px solid rgba(14, 165, 233, 0.2);
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0 16px;
            z-index: 9998 !important;
        }
        .start-btn {
            background: transparent;
            color: white;
            border: none;
            padding: 8px 14px;
            border-radius: 8px;
            cursor: pointer;
            font-weight: bold;
            font-size: 15px;
            transition: background 0.2s;
        }
        .start-btn:hover {
            background-color: rgba(14, 165, 233, 0.25);
        }
        .taskbar-right {
            display: flex;
            align-items: center;
            gap: 15px;
            font-size: 13px;
            color: rgba(255,255,255,0.8);
        }
    </style>
</head>
<body>
    <!-- ========== サイドバー ========== -->
    <div class="sidebar">
        <ul>
            <li><a href="Home.html"><i class="fa-solid fa-house mr-2"></i> Home</a></li>
            <li><a href="desktop.html"><i class="fa-solid fa-desktop mr-2"></i> Desktop</a></li>
            <li><a href="document.html"><i class="fa-solid fa-file-lines mr-2"></i> Document</a></li>
            <li><a href="download.html"><i class="fa-solid fa-download mr-2"></i> Download</a></li>
            <li><a href="video.html" class="active"><i class="fa-solid fa-video mr-2"></i> Video</a></li>
            <li><a href="picture.html"><i class="fa-solid fa-image mr-2"></i> Picture</a></li>
            <li><a href="office.html"><i class="fa-solid fa-briefcase mr-2"></i> Office</a></li>
        </ul>
    </div>

    <!-- ========== メインエリア ========== -->
    <div class="main-content">
        <div class="section-title">🎬 ビデオフォルダ</div>
        <div class="grid">
            <div class="item" onclick="openVideoPlayer()">
                <div class="icon">🎬</div>
                <span>video 1</span>
            </div>
            <div class="item" onclick="openVideoPlayer()">
                <div class="icon">🎬</div>
                <span>video 2</span>
            </div>
            <div class="item" onclick="openVideoPlayer()">
                <div class="icon">🎬</div>
                <span>video 3</span>
            </div>
            <div class="item" onclick="openVideoPlayer()">
                <div class="icon">🎬</div>
                <span>video 4</span>
            </div>
            <div class="item" onclick="openVideoPlayer()">
                <div class="icon">🎬</div>
                <span>video 5</span>
            </div>
        </div>
    </div>

    <!-- ========== スライム装飾 ========== -->
    <div class="slime" style="top: 20%; left: 15%; animation-delay: 0s">
        <img src="image.png" style="width: 45px" alt="slime" />
    </div>
    <div class="slime" style="top: 50%; left: 70%; animation-delay: 2s">
        <img src="image.png" style="width: 35px" alt="slime" />
    </div>
    <div class="slime" style="top: 70%; left: 40%; animation-delay: 4s">
        <img src="image.png" style="width: 50px" alt="slime" />
    </div>
    <div class="slime" style="top: 30%; left: 25%; animation-delay: 1s">
        <img src="image.png" style="width: 40px" alt="slime" />
    </div>
    <div class="slime" style="top: 65%; left: 75%; animation-delay: 3s">
        <img src="image.png" style="width: 38px" alt="slime" />
    </div>

    <!-- ========== ビデオプレイヤーウィンドウ ========== -->
    <div id="videoAppWindow" class="video-window">
        <div class="window-header drag-handle">
            <span>🎬 ビデオプレイヤー</span>
            <button class="close-btn" onclick="closeVideoWindow()">❌</button>
        </div>
        <div class="video-container">
            <video id="videoPlayer" controlsList="nodownload" controls>
                お使いのブラウザは動画再生に対応していません。
            </video>
        </div>
        <div class="video-toolbar">
            <button id="videoOpenBtn" class="video-open-btn">📂 動画を開く</button>
            <button id="videoPlayBtn">▶️ 再生</button>
            <button id="videoPauseBtn">⏸️ 一時停止</button>
            <button id="videoStopBtn">⏹️ 停止</button>
            <label>音量: <input type="range" id="videoVolume" min="0" max="1" step="0.1" value="1"></label>
            <input type="file" id="videoLoader" class="hidden-input" accept="video/*">
        </div>
    </div>

    <!-- ========== スタートメニュー ========== -->
    <div id="startMenu" class="menu-glass w-72 p-6 rounded-2xl text-white shadow-2xl transition-all duration-500 opacity-0 scale-95 origin-bottom-left">
        <h2 class="text-xl font-bold mb-4 text-sky-300">✨ Slime OS Menu ✨</h2>
        <div class="space-y-3">
            <a href="Home.html" class="block w-full text-left p-3 bg-sky-500/20 rounded-lg font-medium hover:bg-white/10 transition">🌿 スライムの森</a>
            <a href="mizube.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">💧 水辺の広場</a>
            <a href="settei.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">⚙️ 設定</a>
            <a href="karennda2-.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">📅 カレンダー</a>
            <a href="office.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">📚 Office</a>
        </div>
    </div>

    <!-- ========== タスクバー ========== -->
    <div class="taskbar">
        <div class="taskbar-left">
            <button class="start-btn" onclick="toggleMenu()">Slime OS</button>
        </div>
        <div class="taskbar-right">
            <span id="currentTime">2026/07/12 04:57</span>
            <span>🔊 100%</span>
            <span>🌙</span>
        </div>
    </div>

    <script>
        // スタートメニュー開閉
        function toggleMenu() {
            const menu = document.getElementById('startMenu');
            menu.classList.toggle('opacity-0');
            menu.classList.toggle('scale-95');
            if (menu.classList.contains('opacity-0')) {
                menu.style.pointerEvents = 'none';
            } else {
                menu.style.pointerEvents = 'auto';
            }
        }

        // 時計表示
        function updateTime() {
            const now = new Date();
            const timeStr = now.getFullYear() + '/' + 
                            String(now.getMonth()+1).padStart(2,'0') + '/' + 
                            String(now.getDate()).padStart(2,'0') + ' ' + 
                            String(now.getHours()).padStart(2,'0') + ':' + 
                            String(now.getMinutes()).padStart(2,'0');
            document.getElementById('currentTime').innerText = timeStr;
        }
        updateTime();
        setInterval(updateTime, 60000);

        // ==================================================
        // 🎬 ビデオプレイヤー機能
        // ==================================================
        const videoAppWindow = document.getElementById("videoAppWindow");
        const videoPlayer = document.getElementById("videoPlayer");
        const videoLoader = document.getElementById("videoLoader");
        let activeWindow = null;
        let initialX, initialY, offsetX, offsetY;

        function openVideoPlayer() {
            videoAppWindow.style.display = "flex";
            videoAppWindow.style.zIndex = 300;
        }
        function closeVideoWindow() {
            videoAppWindow.style.display = "none";
            videoPlayer.pause();
            videoPlayer.src = "";
        }

        document.getElementById('videoOpenBtn').addEventListener('click', () => videoLoader.click());
        videoLoader.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            videoPlayer.src = URL.createObjectURL(file);
            videoPlayer.load();
            videoPlayer.play();
        });

        document.getElementById('videoPlayBtn').addEventListener('click', () => videoPlayer.play());
        document.getElementById('videoPauseBtn').addEventListener('click', () => videoPlayer.pause());
        document.getElementById('videoStopBtn').addEventListener('click', () => {
            videoPlayer.pause();
            videoPlayer.currentTime = 0;
        });
        document.getElementById('videoVolume').addEventListener('input', (e) => {
            videoPlayer.volume = parseFloat(e.target.value);
        });

        // ==================================================
        // ウィンドウドラッグ機能
        // ==================================================
        document.querySelectorAll('.window-header').forEach(header => {
            header.addEventListener('mousedown', (e) => {
                activeWindow = header.parentElement;
                initialX = e.clientX;
                initialY = e.clientY;
                offsetX = activeWindow.getBoundingClientRect().left;
                offsetY = activeWindow.getBoundingClientRect().top;
                activeWindow.style.zIndex = 300;
            });
        });
        document.addEventListener('mousemove', (e) => {
            if (!activeWindow) return;
            const dx = e.clientX - initialX;
            const dy = e.clientY - initialY;
            activeWindow.style.left = `${offsetX + dx}px`;
            activeWindow.style.top = `${offsetY + dy}px`;
        });
        document.addEventListener('mouseup', () => activeWindow = null);

        // ==================================================
        // 共通イベント
        // ==================================================
        document.addEventListener("click", (e) => {
            const startMenu = document.getElementById('startMenu');
            const menuBtn = document.querySelector('button[onclick="toggleMenu()"]');
            if (startMenu && !startMenu.contains(e.target) && !menuBtn.contains(e.target)) {
                startMenu.classList.add('opacity-0', 'scale-95');
                startMenu.style.pointerEvents = 'none';
            }
        });
    </script>
</body>
</html>
