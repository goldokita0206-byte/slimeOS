<!doctype html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
  <meta http-equiv="Pragma" content="no-cache">
  <meta http-equiv="Expires" content="0">
  <title>Slime OS - 最終安定版</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    /* ========== 共通リセット ========== */
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: "Segoe UI", sans-serif;
      background: url("image4.png") no-repeat center center fixed;
      background-size: cover;
      min-height: 100vh;
      overflow: hidden;
    }

    /* ========== サイドバー：絶対に隠れない固定 ========== */
    .sidebar {
      position: fixed;
      top: 0;
      left: 0;
      width: 180px;
      height: 100vh;
      background: rgba(255,255,255,0.18);
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
      border-right: 1px solid rgba(255,255,255,0.25);
      padding: 20px 12px;
      z-index: 100;
    }
    .sidebar ul { list-style: none; }
    .sidebar li { margin-bottom: 6px; }
    .sidebar a {
      display: block;
      padding: 12px 10px;
      color: #ffffff;
      font-size: 15px;
      text-decoration: none;
      border-radius: 6px;
      transition: background 0.2s;
    }
    .sidebar a:hover { background: rgba(255,255,255,0.22); }

    /* ========== メインエリア：サイドバーの右に完全固定 ========== */
    .main-area {
      position: absolute;
      top: 0;
      left: 180px;
      right: 0;
      bottom: 56px; /* タスクバーの高さ分を確保 */
      padding: 25px;
      overflow-y: auto;
      z-index: 50;
    }
    .folder-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(140px, 1fr));
      gap: 35px 20px;
      margin-bottom: 30px;
    }
    .folder-item {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      padding: 12px 8px;
      border-radius: 8px;
      color: #222222;
      font-weight: 500;
      font-size: 15px;
      text-decoration: none;
      transition: background 0.2s;
    }
    .folder-item:hover { background: rgba(255,255,255,0.25); }
    .folder-icon { font-size: 42px; }

    /* ========== ドライブ表示：位置固定 ========== */
    .drive-box {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-top: 10px;
      width: fit-content;
    }
    .drive-card {
      display: flex;
      align-items: center;
      gap: 15px;
      padding: 10px 16px;
      background: rgba(255,255,255,0.2);
      backdrop-filter: blur(8px);
      border-radius: 8px;
      cursor: pointer;
      transition: background 0.2s;
    }
    .drive-card:hover { background: rgba(255,255,255,0.4); }
    .drive-icon { font-size: 32px; }
    .drive-name { font-size: 15px; font-weight: 500; margin-bottom: 4px; }
    .drive-bar {
      width: 140px;
      height: 8px;
      background: rgba(100,100,100,0.25);
      border-radius: 4px;
      overflow: hidden;
    }
    .drive-used { width: 12%; height: 100%; background: #0099ff; border-radius: 4px; }
    .drive-size { font-size: 13px; color: #333; margin-top: 3px; }

    /* ========== タスクバー：中央ボタン確定 ========== */
    .taskbar {
      position: fixed;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 56px;
      background: rgba(0,0,0,0.45);
      backdrop-filter: blur(12px);
      display: flex;
      align-items: center;
      justify-content: center;
      border-top: 1px solid rgba(96,165,250,0.25);
      z-index: 9998;
    }
    .slime-btn {
      background: linear-gradient(135deg, #38bdf8, #8b5cf6);
      color: white;
      border: none;
      padding: 9px 28px;
      border-radius: 24px;
      font-size: 15px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.2s;
      box-shadow: 0 2px 10px rgba(56,189,248,0.35);
    }
    .slime-btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 4px 15px rgba(56,189,248,0.5);
    }
    .task-time {
      position: absolute;
      right: 24px;
      color: rgba(255,255,255,0.85);
      font-size: 14px;
    }

    /* ========== スタートメニュー：中央ボタン真上 ========== */
    .start-menu {
      position: fixed;
      left: 50%;
      bottom: 65px;
      transform: translateX(-50%) scale(0.95);
      transform-origin: bottom center;
      width: 280px;
      padding: 20px;
      background: rgba(30,41,59,0.88);
      backdrop-filter: blur(16px);
      border: 1px solid rgba(96,165,250,0.25);
      border-radius: 16px;
      color: white;
      opacity: 0;
      pointer-events: none;
      transition: all 0.3s ease;
      z-index: 9999;
    }
    .start-menu.active {
      opacity: 1;
      transform: translateX(-50%) scale(1);
      pointer-events: auto;
    }
    .menu-title {
      text-align: center;
      font-size: 18px;
      font-weight: bold;
      margin-bottom: 16px;
      color: #93c5fd;
    }
    .menu-item {
      display: block;
      padding: 10px 14px;
      margin-bottom: 6px;
      border-radius: 8px;
      color: white;
      text-decoration: none;
      transition: background 0.2s;
    }
    .menu-item:hover { background: rgba(255,255,255,0.15); }
  </style>
</head>
<body>
  <!-- サイドバー -->
  <div class="sidebar">
    <ul>
      <li><a href="Home.html">🏠 Home</a></li>
      <li><a href="desktop.html">🖥️ Desktop</a></li>
      <li><a href="document.html">📄 Document</a></li>
      <li><a href="download.html">📥 Download</a></li>
      <li><a href="video.html">🎬 Video</a></li>
      <li><a href="picture.html">🖼️ Picture</a></li>
      <li><a href="office.html">📚 Office</a></li>
    </ul>
  </div>

  <!-- メインエリア -->
  <div class="main-area">
    <div class="folder-grid">
      <a href="Home.html" class="folder-item"><span class="folder-icon">📁</span>Home</a>
      <a href="desktop.html" class="folder-item"><span class="folder-icon">📁</span>Desktop</a>
      <a href="document.html" class="folder-item"><span class="folder-icon">📁</span>Document</a>
      <a href="download.html" class="folder-item"><span class="folder-icon">📁</span>Download</a>
      <a href="video.html" class="folder-item"><span class="folder-icon">🎬</span>Video</a>
      <a href="picture.html" class="folder-item"><span class="folder-icon">🖼️</span>Picture</a>
      <a href="office.html" class="folder-item"><span class="folder-icon">📚</span>Office</a>
    </div>

    <!-- ドライブ表示 -->
    <div class="drive-box">
      <div class="drive-card" onclick="openLocalDisk()">
        <span class="drive-icon">💽</span>
        <div>
          <div class="drive-name">ローカル ディスク (C:)</div>
          <div class="drive-bar"><div class="drive-used"></div></div>
          <div class="drive-size">空き領域 128 GB / 146 GB</div>
        </div>
      </div>
      <div class="drive-card" onclick="openDrive()">
        <span class="drive-icon">💿</span>
        <div class="drive-name">DVD/CD-RW (D:) / USB</div>
      </div>
    </div>
  </div>

  <!-- タスクバー -->
  <div class="taskbar">
    <button class="slime-btn" onclick="toggleMenu()">Slime OS</button>
    <div class="task-time" id="timeShow"></div>
  </div>

  <!-- スタートメニュー -->
  <div class="start-menu" id="startMenu">
    <div class="menu-title">✨ Slime OS Menu ✨</div>
    <a href="Home.html" class="menu-item">🌿 スライムの森</a>
    <a href="mizube.html" class="menu-item">💧 水辺の広場</a>
    <a href="settei.html" class="menu-item">⚙️ 設定</a>
    <a href="karennda2-.html" class="menu-item">📅 カレンダー</a>
    <a href="office.html" class="menu-item">📚 Office</a>
  </div>

  <!-- 隠しファイル選択 -->
  <input type="file" id="fileDrive" style="display:none" webkitdirectory directory>
  <input type="file" id="fileLocal" style="display:none" webkitdirectory directory>

  <script>
    const menu = document.getElementById('startMenu');
    const btn = document.querySelector('.slime-btn');

    // メニュー開閉
    function toggleMenu() { menu.classList.toggle('active'); }
    // 外側クリックで閉じる
    document.addEventListener('click', e => {
      if (!menu.contains(e.target) && !btn.contains(e.target)) {
        menu.classList.remove('active');
      }
    });

    // 時計
    function updateTime() {
      const d = new Date();
      document.getElementById('timeShow').innerText = 
        `${d.getFullYear()}/${String(d.getMonth()+1).padStart(2,'0')}/${String(d.getDate()).padStart(2,'0')} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
    }
    updateTime();
    setInterval(updateTime, 60000);

    // ドライブ操作
    function openDrive() { document.getElementById('fileDrive').click(); }
    function openLocalDisk() { document.getElementById('fileLocal').click(); }
  </script>
</body>
</html>
