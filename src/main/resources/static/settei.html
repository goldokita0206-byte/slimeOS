<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Slime OS - 設定</title>
    <link rel="stylesheet" href="settei.css" />
    <!-- Font Awesome 読み込み -->
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
        font-family: "メイリオ", Meiryo, sans-serif;
      }
      body {
        height: 100vh;
        /* 背景画像 */
        background-image: url("taki.jpeg");
        background-size: cover;
        background-position: center;
        background-attachment: fixed;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .settings-container {
        width: 90%;
        max-width: 900px;
        background: rgba(164, 247, 178, 0.15);
        backdrop-filter: blur(16px);
        border-radius: 16px;
        border: 1px solid rgba(255, 255, 255, 0.2);
        padding: 2rem;
        color: #0b0333;
        box-shadow: 0 8px 32px rgba(0, 0, 0, 0.1);
      }
      .header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 2rem;
      }
      .user-info {
        display: flex;
        align-items: center;
        gap: 1rem;
      }
      .avatar {
        width: 50px;
        height: 50px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 1.5rem;
      }
      .user-details h1 {
        font-size: 1.2rem;
        margin-bottom: 0.2rem;
      }
      .user-details p {
        font-size: 0.85rem;
        opacity: 0.8;
        margin-bottom: 0.1rem;
      }
      .user-details a {
        font-size: 0.85rem;
        color: #b8e1ff;
        text-decoration: none;
      }
      .promo-buttons {
        display: flex;
        gap: 0.8rem;
      }
      .btn-primary {
        background: #4ade80;
        color: #166534;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 6px;
        font-weight: bold;
        cursor: pointer;
      }
      .btn-link {
        background: rgba(255, 255, 255, 0.1);
        color: #fff;
        border: none;
        padding: 0.5rem 1.2rem;
        border-radius: 6px;
        cursor: pointer;
      }
      .settings-grid {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
        gap: 1rem;
      }
      .grid-item {
        background: rgba(255, 255, 255, 0.1);
        border-radius: 10px;
        padding: 1.2rem;
        display: flex;
        align-items: flex-start;
        gap: 0.8rem;
        border: 1px solid rgba(255, 255, 255, 0.1);
        cursor: pointer;
        transition: all 0.2s ease;
      }
      .grid-item:hover {
        background: rgba(255, 255, 255, 0.2);
        transform: translateY(-2px);
      }
      .icon-blue {
        font-size: 1.5rem;
        color: #580ae9;
        margin-top: 0.2rem;
      }
      .text h3 {
        font-size: 1rem;
        margin-bottom: 0.3rem;
      }
      .text p {
        font-size: 0.8rem;
        opacity: 0.85;
        line-height: 1.4;
      }
    </style>
    <!-- シャボン玉アニメーション用 -->
<style>
/* シャボン玉のコンテナ：画面全体に重ねて表示 */
.bubble-container {
  position: absolute;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  overflow: hidden;
  pointer-events: none; /* クリックなどを透過して下のアイコンが使える */
  z-index: 5; /* 背景より上、アイコンより下に調整可 */
}

/* シャボン玉本体 */
.bubble {
  position: absolute;
  bottom: -50px; /* 画面外下から出現 */
  background: rgba(255, 255, 255, 0.4);
  border: 1px solid rgba(255, 255, 255, 0.6);
  border-radius: 50%;
  box-shadow: inset 0 0 8px rgba(255, 255, 255, 0.3),
              0 0 12px rgba(173, 216, 230, 0.4);
  animation: rise 8s linear infinite;
}

/* 上昇＋ゆらぎ＋消えるアニメーション */
@keyframes rise {
  0% {
    transform: translateY(0) translateX(0) scale(0.5);
    opacity: 0;
  }
  10% {
    opacity: 0.8;
  }
  90% {
    opacity: 0.6;
  }
  100% {
    transform: translateY(-110vh) translateX(calc(-50px + 100px * var(--drift))) scale(1.1);
    opacity: 0;
  }
}
</style>

<!-- シャボン玉を生成するJavaScript -->
<script>
function createBubble() {
  const container = document.querySelector('.bubble-container');
  if (!container) return;

  // ランダムな大きさ・位置・速度・揺れ幅
  const size = Math.random() * 30 + 15; // 15px～45px
  const bubble = document.createElement('div');
  bubble.classList.add('bubble');
  
  // スタイルをランダム設定
  bubble.style.width = size + 'px';
  bubble.style.height = size + 'px';
  bubble.style.left = Math.random() * 100 + '%';
  bubble.style.animationDuration = (Math.random() * 4 + 6) + 's'; // 6～10秒で上昇
  bubble.style.animationDelay = Math.random() * 2 + 's';
  bubble.style.setProperty('--drift', Math.random()); // 左右の揺れ

  container.appendChild(bubble);

  // アニメーション終了後に要素を削除
  setTimeout(() => bubble.remove(), 12000);
}

// ページ読み込み後、一定間隔でシャボン玉を生成
window.addEventListener('load', () => {
  // コンテナがなければ作成
  if (!document.querySelector('.bubble-container')) {
    const bubbleArea = document.createElement('div');
    bubbleArea.classList.add('bubble-container');
    document.body.appendChild(bubbleArea);
  }
  // 0.3秒ごとに1つ生成
  setInterval(createBubble, 300);
});
</script>
    <div class="settings-container">
      <!-- ヘッダーエリア -->
      <header class="header">
        <div class="user-info">
          <div class="avatar"><i class="fas fa-user"></i></div>
          <div class="user-details">
            <h1>suraim os</h1>
            <p>ローカル アカウント</p>
            <a href="#">サインイン</a>
          </div>
        </div>
        <div class="promo-banner">
          <div class="promo-buttons">
            <button class="btn-primary" onclick="openWindowsSetting('')">設定トップ</button>
            <button class="btn-link">スキップ</button>
          </div>
        </div>
      </header>

      <!-- メニューグリッド：Windows実設定起動 -->
      <main class="settings-grid">
        <div class="grid-item" onclick="openWindowsSetting('system')">
          <i class="fas fa-laptop icon-blue"></i>
          <div class="text">
            <h3>システム</h3>
            <p>ディスプレイ、サウンド、通知、電源</p>
          </div>
        </div>
        <div class="grid-item" onclick="openWindowsSetting('devices')">
          <i class="fas fa-keyboard icon-blue"></i>
          <div class="text">
            <h3>デバイス</h3>
            <p>Bluetooth、プリンター、マウス</p>
          </div>
        </div>
        <div class="grid-item" onclick="openWindowsSetting('mobile-devices')">
          <i class="fas fa-mobile-alt icon-blue"></i>
          <div class="text">
            <h3>電話</h3>
            <p>Android、iPhone のリンク</p>
          </div>
        </div>
        <div class="grid-item" onclick="openWindowsSetting('network-internet')">
          <i class="fas fa-globe icon-blue"></i>
          <div class="text">
            <h3>ネットワークとインターネット</h3>
            <p>Wi‑Fi、機内モード、VPN</p>
          </div>
        </div>
        <div class="grid-item" onclick="openWindowsSetting('personalization')">
          <i class="fas fa-paint-brush icon-blue"></i>
          <div class="text">
            <h3>個人用設定</h3>
            <p>背景、ロック画面、色</p>
          </div>
        </div>
        <div class="grid-item" onclick="openWindowsSetting('apps')">
          <i class="fas fa-th-list icon-blue"></i>
          <div class="text">
            <h3>アプリ</h3>
            <p>アンインストール、既定値、オプション機能</p>
          </div>
        </div>
      </main>
    </div>

    <script>
      // Windows 10/11 の実際の設定画面を開く
      function openWindowsSetting(page) {
        // Windows公式の「ms-settings:」プロトコルを使用
        const settingsMap = {
          '': 'ms-settings:',                     // 設定トップ
          'system': 'ms-settings:display',        // システム > ディスプレイ
          'devices': 'ms-settings:bluetooth',    // デバイス > Bluetooth
          'mobile-devices': 'ms-settings:mobile-devices', // 電話
          'network-internet': 'ms-settings:network', // ネットワーク
          'personalization': 'ms-settings:personalization', // 個人用設定
          'apps': 'ms-settings:appsfeatures'     // アプリ
        };

        const targetUrl = settingsMap[page] || 'ms-settings:';
        // プロトコルを実行して設定を起動
        window.open(targetUrl, '_self');
      }
    </script>
  </body>
</html>
