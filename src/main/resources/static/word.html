<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>自作ワードエディター</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdn.jsdelivr.net/npm/font-awesome@4.7.0/css/font-awesome.min.css" rel="stylesheet">
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        doc: {
                            primary: '#2b579a',
                            light: '#f8f9fa',
                            border: '#e0e0e0',
                            text: '#333333'
                        }
                    },
                    fontFamily: {
                        meiryo: ['"メイリオ"', 'Meiryo', 'sans-serif'],
                        gothic: ['"ＭＳ ゴシック"', 'sans-serif'],
                        mincho: ['"ＭＳ 明朝"', 'serif']
                    }
                }
            }
        }
    </script>
    <style type="text/tailwindcss">
        @layer utilities {
            .editor-content {
                min-height: 70vh;
                box-shadow: 0 0 10px rgba(0,0,0,0.1);
            }
            .toolbar-btn {
                @apply px-3 py-1.5 rounded hover:bg-doc-light transition-colors;
            }
            .toolbar-btn.active {
                @apply bg-doc-primary text-white;
            }
        }
    </style>
</head>
<body class="bg-gray-100 min-h-screen font-meiryo">
    <!-- ツールバー -->
    <div class="bg-white border-b border-doc-border p-2 shadow-sm">
        <div class="max-w-5xl mx-auto flex flex-wrap items-center gap-2">
            <!-- ファイル操作 -->
            <button id="saveBtn" class="toolbar-btn flex items-center gap-1">
                <i class="fa fa-save"></i> 保存
            </button>
            <button id="loadBtn" class="toolbar-btn flex items-center gap-1">
                <i class="fa fa-folder-open"></i> 開く
            </button>
            <span class="text-gray-300 mx-1">|</span>

            <!-- 文字装飾 -->
            <button class="toolbar-btn" data-command="bold" title="太字">
                <i class="fa fa-bold"></i>
            </button>
            <button class="toolbar-btn" data-command="italic" title="斜体">
                <i class="fa fa-italic"></i>
            </button>
            <button class="toolbar-btn" data-command="underline" title="下線">
                <i class="fa fa-underline"></i>
            </button>
            <span class="text-gray-300 mx-1">|</span>

            <!-- フォント設定 -->
            <select id="fontFamily" class="border rounded px-2 py-1">
                <option value="メイリオ">メイリオ</option>
                <option value="ＭＳ ゴシック">ＭＳ ゴシック</option>
                <option value="ＭＳ 明朝">ＭＳ 明朝</option>
                <option value="Arial">Arial</option>
            </select>
            <select id="fontSize" class="border rounded px-2 py-1">
                <option value="12px">12pt</option>
                <option value="14px" selected>14pt</option>
                <option value="16px">16pt</option>
                <option value="18px">18pt</option>
                <option value="20px">20pt</option>
            </select>
            <span class="text-gray-300 mx-1">|</span>

            <!-- 配置 -->
            <button class="toolbar-btn" data-command="justifyLeft" title="左揃え">
                <i class="fa fa-align-left"></i>
            </button>
            <button class="toolbar-btn" data-command="justifyCenter" title="中央揃え">
                <i class="fa fa-align-center"></i>
            </button>
            <button class="toolbar-btn" data-command="justifyRight" title="右揃え">
                <i class="fa fa-align-right"></i>
            </button>
        </div>
    </div>

    <!-- エディター領域 -->
    <div class="max-w-4xl mx-auto mt-6 mb-10 p-4">
        <div 
            id="editor" 
            class="editor-content bg-white p-8 rounded border border-doc-border outline-none"
            contenteditable="true"
            placeholder="ここに文字を入力してください..."
        ></div>
    </div>

    <!-- 隠しファイル入力 -->
    <input type="file" id="fileInput" accept=".txt,.html" class="hidden">

    <script>
        const editor = document.getElementById('editor');
        const saveBtn = document.getElementById('saveBtn');
        const loadBtn = document.getElementById('loadBtn');
        const fileInput = document.getElementById('fileInput');

        // 基本編集機能
        document.querySelectorAll('[data-command]').forEach(btn => {
            btn.addEventListener('click', () => {
                const command = btn.dataset.command;
                document.execCommand(command, false, null);
                editor.focus();
            });
        });

        // フォント変更
        document.getElementById('fontFamily').addEventListener('change', (e) => {
            document.execCommand('fontName', false, e.target.value);
            editor.focus();
        });

        document.getElementById('fontSize').addEventListener('change', (e) => {
            document.execCommand('fontSize', false, e.target.value);
            editor.focus();
        });

        // 保存機能
        saveBtn.addEventListener('click', () => {
            const content = editor.innerHTML;
            const blob = new Blob([content], {type: 'text/html;charset=utf-8'});
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = `document_${new Date().toLocaleDateString('ja-JP')}.html`;
            a.click();
            URL.revokeObjectURL(url);
            alert('ファイルを保存しました！');
        });

        // 読み込み機能
        loadBtn.addEventListener('click', () => fileInput.click());
        fileInput.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            
            const reader = new FileReader();
            reader.onload = (event) => {
                editor.innerHTML = event.target.result;
            };
            reader.readAsText(file);
        });

        // 初期フォーカス
        editor.focus();
    </script>
</body>
</html>
