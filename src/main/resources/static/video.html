<!doctype html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <title>Slime OS - 統合版</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      /* ========== 共通リセット・基本設定 ========== */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        font-family: "Segoe UI", sans-serif;
        background: url("06.jpeg") no-repeat center center fixed;
        background-size: cover;
        color: #1a1a1a;
        height: 100vh;
        position: relative;
        overflow: hidden;
      }

      /* ========== サイドバー ========== */
      .sidebar {
        position: absolute;
        top: 0;
        left: 0;
        height: 100vh;
        width: 180px;
        background-color: rgba(255, 255, 255, 0.65);
        backdrop-filter: blur(1px);
        border-right: 1px solid rgba(180, 180, 180, 0.3);
        padding: 15px 0;
        font-size: 14px;
        z-index: 50;
      }
      .sidebar-item {
        padding: 8px 16px;
        cursor: pointer;
        color: #222;
        border-radius: 4px;
        margin: 2px 8px;
      }
      .sidebar-item:hover {
        background-color: rgba(0, 120, 215, 0.15);
      }
      .sidebar-item.active {
        background-color: rgba(0, 120, 215, 0.3);
        color: #000;
        font-weight: 600;
      }

      .main-content {
        position: absolute;
        top: 0;
        left: 180px;
        right: 0;
        bottom: 0;
        padding: 20px;
        /* ✅ 透明に変更 */
        background-color: transparent;
        backdrop-filter: none;
        overflow-y: auto;
        z-index: 40;
      }

      .section-title {
        font-size: 14px;
        border-bottom: 1px solid rgba(150, 150, 150, 0.3);
        padding-bottom: 6px;
        margin-bottom: 16px;
        color: #444;
        font-weight: 600;
      }

      .grid {
        display: grid;
        grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
        gap: 30px;
        margin-bottom: 30px;
      }

      .item {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        padding: 10px;
        cursor: pointer;
        border-radius: 6px;
        color: #111;
        font-weight: 500;
        transition: all 0.2s;
        text-align: center;
        background-color: rgba(255, 255, 255, 0.2);
        backdrop-filter: blur(4px);
      }
      .item:hover {
        background-color: rgba(255, 255, 255, 0.4);
      }

      .icon {
        width: 48px;
        height: 48px;
        background-color: transparent;
        border-radius: 4px;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 32px;
        margin-bottom: 4px;
      }

      /* ========== ウィンドウ共通 ========== */
      .window {
        display: none;
        position: absolute;
        top: 10%;
        left: 22%;
        width: 55%;
        height: 72%;
        background-color: rgba(240, 98, 98, 0.9);
        backdrop-filter: blur(8px);
        color: #333;
        border-radius: 10px;
        box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        border: 1px solid rgba(200, 200, 200, 0.4);
        z-index: 200;
        flex-direction: column;
        overflow: hidden;
      }

      .window-header {
        background-color: rgba(8, 231, 164, 0.8);
        padding: 10px 16px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        border-bottom: 1px solid rgba(200, 200, 200, 0.4);
        font-weight: bold;
        user-select: none;
        font-size: 14px;
      }

      .close-btn {
        background: none;
        border: none;
        font-size: 16px;
        cursor: pointer;
        color: #666;
        padding: 4px 8px;
        border-radius: 4px;
      }
      .close-btn:hover {
        color: #41f541;
        background-color: #e53935;
      }

      .window-content {
        padding: 16px;
        flex-grow: 1;
        background-color: rgba(250, 250, 250, 0.6);
        overflow-y: auto;
      }

      /* ========== 🎬 ビデオプレイヤー ========== */
      .video-window {
        display: none;
        position: absolute;
        top: 5%;
        left: 10%;
        width: 80%;
        height: 85%;
        background-color: #000;
        border-radius: 10px;
        box-shadow: 0 15px 40px rgba(0, 0, 0, 0.25);
        border: 1px solid #333;
        z-index: 220;
        flex-direction: column;
        overflow: hidden;
      }
      .video-container {
        flex-grow: 1;
        display: flex;
        align-items: center;
        justify-content: center;
        background: #000;
        position: relative;
      }
      #videoPlayer {
        width: 100%;
        height: 100%;
        object-fit: contain;
      }
      .video-toolbar {
        background-color: #222;
        padding: 10px 15px;
        display: flex;
        gap: 15px;
        align-items: center;
        color: white;
      }
      .video-toolbar button {
        background: #444;
        color: white;
        border: none;
        padding: 8px 16px;
        border-radius: 4px;
        cursor: pointer;
        font-size: 14px;
      }
      .video-toolbar button:hover {
        background: #666;
      }
      .video-toolbar input[type="range"] {
        width: 120px;
      }
      .video-open-btn {
        background: #2196F3;
      }
      .video-open-btn:hover {
        background: #1976D2;
      }
      .hidden-input {
        display: none;
      }

      /* ========== スライムアニメーション ========== */
      .slime {
        position: absolute;
        animation: float 6s ease-in-out infinite;
        cursor: pointer;
        pointer-events: auto;
        /* ✅ スライムを前面に表示 */
        z-index: 60;
      }
      @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
      }

      /* スタートメニュー */
      .menu-glass { 
        background: rgba(30, 41, 59, 0.85); 
        backdrop-filter: blur(15px); 
        border: 1px solid rgba(56, 189, 248, 0.2);
      }
    </style>
  </head>
  <body>
    <!-- ========== サイドバー ========== -->
    <div class="sidebar">
      <nav>
        <ul style="list-style: none;">
          <li class="sidebar-item" onclick="location.href='Home.html'">🏠 Home</li>
          <li class="sidebar-item" onclick="location.href='desktop.html'">🖥️ Desktop</li>
          <li class="sidebar-item" onclick="location.href='document.html'">📝 Document</li>
          <li class="sidebar-item" onclick="location.href='download.html'">📥 Download</li>
          <li class="sidebar-item active" onclick="location.href='video.html'">🎬 Video</li>
        </ul>
      </nav>
    </div>

    <!-- ========== メインエリア ========== -->
    <div class="main-content">
      <div class="section-title">ビデオ</div>
      <div class="grid">
        <!-- ✅ ビデオを5つ表示 -->
        <div class="item" onclick="openVideoPlayer()">
          <div class="icon">🎬</div>
          <span>video 1</span>
        </div>
        <div class="item" onclick="openVideoPlayer()">
          <div class="icon">🎬</div>
          <span>video 2</span>
        </div>
        <div class="item" onclick="openVideoPlayer()">
          <div class="icon">🎬</div>
          <span>video 3</span>
        </div>
        <div class="item" onclick="openVideoPlayer()">
          <div class="icon">🎬</div>
          <span>video 4</span>
        </div>
        <div class="item" onclick="openVideoPlayer()">
          <div class="icon">🎬</div>
          <span>video 5</span>
        </div>
      </div>
    </div>

    <!-- ========== スライム装飾 ========== -->
    <div class="slime" style="top: 20%; left: 15%; animation-delay: 0s">
      <img src="image.png" style="width: 45px" alt="slime" />
    </div>
    <div class="slime" style="top: 50%; left: 70%; animation-delay: 2s">
      <img src="image.png" style="width: 35px" alt="slime" />
    </div>
    <div class="slime" style="top: 70%; left: 40%; animation-delay: 4s">
      <img src="image.png" style="width: 50px" alt="slime" />
    </div>
    <div class="slime" style="top: 30%; left: 25%; animation-delay: 1s">
      <img src="image.png" style="width: 40px" alt="slime" />
    </div>
    <div class="slime" style="top: 65%; left: 75%; animation-delay: 3s">
      <img src="image.png" style="width: 38px" alt="slime" />
    </div>

    <!-- ========== ビデオプレイヤーウィンドウ ========== -->
    <div id="videoAppWindow" class="video-window">
      <div class="window-header" style="background-color: #1a1a1a; color: #fff;">
        <span>ビデオプレイヤー</span>
        <button class="close-btn" onclick="closeVideoWindow()" style="color: #fff;">❌</button>
      </div>
      <div class="video-container">
        <video id="videoPlayer" controlsList="nodownload" controls>
          お使いのブラウザは動画再生に対応していません。
        </video>
      </div>
      <div class="video-toolbar">
        <button id="videoOpenBtn" class="video-open-btn">📂 動画を開く</button>
        <button id="videoPlayBtn">▶️ 再生</button>
        <button id="videoPauseBtn">⏸️ 一時停止</button>
        <button id="videoStopBtn">⏹️ 停止</button>
        <label>音量: <input type="range" id="videoVolume" min="0" max="1" step="0.1" value="1"></label>
        <input type="file" id="videoLoader" class="hidden-input" accept="video/*">
      </div>
    </div>

    <!-- ========== スタートメニュー ========== -->
    <div id="startMenu" class="menu-glass absolute bottom-16 left-4 w-72 p-6 rounded-2xl text-white shadow-2xl transition-all duration-500 opacity-0 scale-95 origin-bottom-left z-50">
      <h2 class="text-xl font-bold mb-4 text-blue-300">✨ Slime OS Menu ✨</h2>
      <div class="space-y-3">
          <a href="Home.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">🌿 スライムの森</a>
          <a href="mizube.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">💧 水辺の広場</a>
          <a href="settei.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">⚙️ 設定</a>
          <a href="karennda2-.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">📅 カレンダー</a>
          <a href="office.html" class="block w-full text-left p-3 hover:bg-white/10 rounded-lg transition">📚 Office</a>
      </div>
    </div>
    
    <!-- ========== タスクバー ========== -->
    <div class="absolute bottom-0 left-0 w-full h-14 bg-black/40 backdrop-blur-md flex items-center px-4 z-50 border-t border-sky-500/20">
        <button onclick="toggleMenu()" class="text-white hover:bg-white/20 p-3 rounded-xl transition font-bold">Slime OS</button>
        <div class="ml-auto text-white/80 text-sm" id="currentTime"></div>
    </div>

    <script>
      // スタートメニュー開閉
      function toggleMenu() {
          const menu = document.getElementById('startMenu');
          if (menu) {
              menu.classList.toggle('opacity-0');
              menu.classList.toggle('scale-95');
          }
      }

      // 時計表示
      function updateTime() {
        const now = new Date();
        const timeStr = now.getFullYear() + '/' + 
                        String(now.getMonth()+1).padStart(2,'0') + '/' + 
                        String(now.getDate()).padStart(2,'0') + ' ' + 
                        String(now.getHours()).padStart(2,'0') + ':' + 
                        String(now.getMinutes()).padStart(2,'0');
        document.getElementById('currentTime').innerText = timeStr;
      }
      updateTime();
      setInterval(updateTime, 60000);

      // ==================================================
      // 🎬 ビデオプレイヤー機能
      // ==================================================
      const videoAppWindow = document.getElementById("videoAppWindow");
      const videoPlayer = document.getElementById("videoPlayer");
      const videoLoader = document.getElementById("videoLoader");

      function openVideoPlayer() {
        videoAppWindow.style.display = "flex";
      }
      function closeVideoWindow() {
        videoAppWindow.style.display = "none";
        videoPlayer.pause();
        videoPlayer.src = "";
      }

      document.getElementById('videoOpenBtn').addEventListener('click', () => videoLoader.click());
      videoLoader.addEventListener('change', (e) => {
        const file = e.target.files[0];
        if (!file) return;
        videoPlayer.src = URL.createObjectURL(file);
        videoPlayer.load();
        videoPlayer.play();
      });

      document.getElementById('videoPlayBtn').addEventListener('click', () => videoPlayer.play());
      document.getElementById('videoPauseBtn').addEventListener('click', () => videoPlayer.pause());
      document.getElementById('videoStopBtn').addEventListener('click', () => {
        videoPlayer.pause();
        videoPlayer.currentTime = 0;
      });
      document.getElementById('videoVolume').addEventListener('input', (e) => {
        videoPlayer.volume = parseFloat(e.target.value);
      });

      // スタートメニュー外クリックで閉じる
      document.addEventListener("click", (e) => {
        const menu = document.getElementById('startMenu');
        const button = document.querySelector('button[onclick="toggleMenu()"]');
        if (menu && !menu.contains(e.target) && !button.contains(e.target)) {
          menu.classList.add('opacity-0', 'scale-95');
        }
      });
    </script>
  </body>
</html>
